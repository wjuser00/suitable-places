<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠 Suitable Places - View Mode</title>
<style>
:root{--bg:#f5f5f0;--card:#fff;--text:#1a1a1a;--text2:#666;--border:#e8e8e3;--accent:#2d2d2d;--accent-light:#f0efe9;--tag:#e8e7e0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-lg:0 10px 40px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","PingFang SC","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.header{text-align:center;padding:48px 24px 24px}
.header h1{font-size:28px;font-weight:600;letter-spacing:-.5px;margin-bottom:6px}
.header p{color:var(--text2);font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;padding:0 24px 60px;max-width:1400px;margin:0 auto}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow-lg)}
.card-header{padding:24px 24px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.card-header h2{font-size:18px;font-weight:600;line-height:1.3}
.card-header .price{font-size:18px;font-weight:600;color:var(--accent);white-space:nowrap;margin-left:12px}
.card-meta{padding:0 24px 16px;display:flex;gap:6px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--tag);color:var(--text2);padding:4px 10px;border-radius:6px;font-size:12px}
.card-notes{padding:0 24px 12px;color:var(--text2);font-size:13px;line-height:1.5}
.card-link{padding:0 24px 16px}
.card-link a{color:var(--accent);font-size:13px;text-decoration:none;border-bottom:1px solid var(--border);padding-bottom:1px}
.expand-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;background:none;border:none;border-top:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer;transition:background .15s}
.expand-btn:hover{background:var(--accent-light)}
.expand-btn .arrow{display:inline-block;transition:transform .25s;font-size:11px}
.expand-btn.open .arrow{transform:rotate(180deg)}
.card-detail{display:none;border-top:1px solid var(--border)}
.card-detail.show{display:block}
.area-section{padding:20px 24px;border-bottom:1px solid var(--border)}
.area-section:last-child{border-bottom:none}
.area-section h3{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.area-images{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:10px}
.area-images .img-slot{aspect-ratio:4/3;border-radius:8px;overflow:hidden;background:var(--accent-light);border:1px solid var(--border);cursor:pointer;transition:transform .2s,box-shadow .2s}
.area-images .img-slot:hover{transform:scale(1.03);box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.area-images .img-slot img{width:100%;height:100%;object-fit:cover}
.area-desc{width:100%;min-height:36px;border:none;padding:8px 0;font-size:13px;font-family:inherit;color:var(--text);background:transparent;line-height:1.5}
.video-section{padding:20px 24px;border-bottom:1px solid var(--border)}
.video-section h3{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.video-wrapper{position:relative;border-radius:8px;overflow:hidden;background:var(--accent-light);border:1px solid var(--border);min-height:120px;display:flex;align-items:center;justify-content:center}
.video-wrapper video,.video-wrapper iframe{width:100%;border-radius:8px;display:block}
.lightbox-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out;padding:20px}
.lightbox-overlay.show{display:flex}
.lightbox-overlay img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,0.5);cursor:default}
.lightbox-close{position:fixed;top:20px;right:24px;z-index:10000;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lightbox-close:hover{background:rgba(255,255,255,0.3)}
.lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);z-index:10000;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lightbox-nav:hover{background:rgba(255,255,255,0.3)}
.lightbox-prev{left:16px}
.lightbox-next{right:16px}
.lightbox-counter{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.7);font-size:14px;z-index:10000;background:rgba(0,0,0,0.4);padding:6px 16px;border-radius:20px}
@media(max-width:768px){.grid{grid-template-columns:1fr}.header{padding:40px 20px 20px}.header h1{font-size:22px}.grid{padding:0 16px 40px}.area-images{grid-template-columns:repeat(3,1fr)}.lightbox-nav{width:36px;height:36px;font-size:20px}.lightbox-prev{left:8px}.lightbox-next{right:8px}}
</style>
</head>
<body>
<div class="header">
<h1>🏠 Suitable Places</h1>
<p>Shared view · Read only</p>
</div>
<div class="grid" id="grid"></div>
<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
<button class="lightbox-close" onclick="closeLightbox(event)">×</button>
<button class="lightbox-nav lightbox-prev" onclick="event.stopPropagation();navLightbox(-1)">‹</button>
<img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
<button class="lightbox-nav lightbox-next" onclick="event.stopPropagation();navLightbox(1)">›</button>
<div class="lightbox-counter" id="lightboxCounter"></div>
</div>
<script>
var CARDS=[{"id": "_44jn1eo", "name": "No.1", "price": "", "location": "Nanjing", "roomType": "2-Bedroom, 1-Bathroom Suite with Living Room and Kitchen", "link": "", "notes": "80㎡ · Approximately 400m from the nearest metro station and relatively not close to the  railway station. Convenient transportation. There are several good restaurants nearby. There is a  large terrace with many flowers and plants . And have many tea sets, where you can brew tea. Smoking and cooking are  allowed.", "videoSrc": "media/new_v1.mp4", "videoType": "file", "_videoBlob": {}, "_videoBlobType": "video/mp4", "areas": {"卧室": {"images": ["media/new_img_000.jpeg", "media/new_img_001.jpeg", "media/new_img_002.jpeg"], "desc": "bedroom"}, "客厅": {"images": ["media/new_img_003.jpeg", "media/new_img_004.jpeg", "media/new_img_005.jpeg"], "desc": "living room"}, "厨房": {"images": ["media/new_img_006.jpeg"], "desc": "kitchen"}, "卫生间": {"images": ["media/new_img_007.jpeg"], "desc": "bathroom"}, "阳台": {"images": ["media/new_img_008.jpeg", "media/new_img_009.jpeg", "media/new_img_010.jpeg"], "desc": "balcony"}, "周边": {"images": ["media/new_img_011.jpeg", "media/new_img_012.jpeg", "media/new_img_013.jpeg", "media/new_img_014.jpeg", "media/new_img_015.jpeg"], "desc": "some nice pictures from other tenants"}}}, {"id": "_pvhh7hc", "name": "No.2", "price": "", "location": "Nanjing", "roomType": "2-Bedroom, 1-Bathroom Suite with Living Room and Kitchen", "link": "", "notes": "80㎡ · About 500m from the nearest metro station, not close to a railway station. Parks nearby. Smoking and cooking are allowed.", "videoSrc": "media/v2.mp4", "videoType": "file", "_videoBlob": {}, "_videoBlobType": "video/mp4", "areas": {"Bedroom": {"images": ["media/img_011.jpeg", "media/img_012.jpeg"], "desc": ""}, "Living Room": {"images": ["media/img_013.jpeg", "media/img_014.jpeg", "media/img_015.jpeg"], "desc": ""}, "Bathroom": {"images": ["media/img_016.jpeg"], "desc": ""}}}, {"id": "_3762k7b", "name": "No.3", "price": "", "location": "Nanjing", "roomType": "2-Bedroom, 1-Bathroom Suite with Living Room and Kitchen", "link": "", "notes": "93㎡ · The nearest metro station is about 1km away, and the railway station is relatively far. Smoking is not allowed. Cooking is allowed.", "videoSrc": "media/v3.mp4", "videoType": "file", "_videoBlob": {}, "_videoBlobType": "video/mp4", "areas": {"Bedroom": {"images": ["media/img_018.jpeg", "media/img_019.jpeg"], "desc": ""}, "Living Room": {"images": ["media/img_020.jpeg", "media/img_021.jpeg"], "desc": ""}, "Kitchen": {"images": ["media/img_022.jpeg"], "desc": ""}, "Bathroom": {"images": ["media/img_023.jpeg"], "desc": ""}}}, {"id": "_yb40fqm", "name": "No.4", "price": "", "location": "Nanjing", "roomType": "2-Bedroom, 1-Bathroom Suite with Living Room and Kitchen", "link": "", "notes": "139㎡ · About 200m from the nearest metro station, not close to a railway station. Scenic spots nearby. Smoking and cooking are not allowed.", "videoSrc": "media/v4.mp4", "videoType": "file", "_videoBlob": {}, "_videoBlobType": "video/mp4", "areas": {"Bedroom": {"images": ["media/img_025.jpeg", "media/img_026.jpeg"], "desc": ""}, "Living Room": {"images": ["media/img_027.jpeg", "media/img_028.jpeg"], "desc": ""}, "Bathroom": {"images": ["media/img_029.jpeg"], "desc": ""}, "Balcony": {"images": ["media/img_030.jpeg"], "desc": ""}}}]
var LANG="en";
var AREA_ICONS={"卧室":"🛏️","客厅":"🛋️","厨房":"🍳","卫生间":"🚿","阳台":"🌿","周边":"🏘️","交通":"🚗","Bedroom":"🛏️","Living Room":"🛋️","Kitchen":"🍳","Bathroom":"🚿","Balcony":"🌿","Surroundings":"🏘️","Transport":"🚗"};
var EXPAND_LABEL="Details";
var VIDEO_LABEL="Video Tour";
var VIEW_LINK_LABEL="View Link";
var allImages=[];var currentLightboxIdx=0;
function esc(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function openLightbox(idx){currentLightboxIdx=idx;showLightboxImage();document.getElementById("lightbox").classList.add("show");document.body.style.overflow="hidden"}
function closeLightbox(e){if(e&&e.target!==e.currentTarget&&!e.target.classList.contains("lightbox-close"))return;document.getElementById("lightbox").classList.remove("show");document.body.style.overflow=""}
function navLightbox(dir){currentLightboxIdx=(currentLightboxIdx+dir+allImages.length)%allImages.length;showLightboxImage()}
function showLightboxImage(){document.getElementById("lightboxImg").src=allImages[currentLightboxIdx];document.getElementById("lightboxCounter").textContent=(currentLightboxIdx+1)+" / "+allImages.length}
function toggleDetail(btn){btn.classList.toggle("open");btn.nextElementSibling.classList.toggle("show")}
document.addEventListener("keydown",function(e){if(!document.getElementById("lightbox").classList.contains("show"))return;if(e.key==="Escape")closeLightbox(e);if(e.key==="ArrowLeft")navLightbox(-1);if(e.key==="ArrowRight")navLightbox(1)});
document.addEventListener("click",function(e){var slot=e.target.closest(".img-slot[data-idx]");if(slot){openLightbox(parseInt(slot.getAttribute("data-idx")))}});
function render(){allImages=[];var grid=document.getElementById("grid");grid.innerHTML="";CARDS.forEach(function(card){var tags="";if(card.location)tags+="<span class=\"tag\">📍"+esc(card.location)+"</span>";if(card.roomType)tags+="<span class=\"tag\">🛏️"+esc(card.roomType)+"</span>";var areasHtml="";var areaKeys=Object.keys(card.areas);for(var ai=0;ai<areaKeys.length;ai++){var areaName=areaKeys[ai];var areaData=card.areas[areaName];var imgsHtml="";for(var ii=0;ii<areaData.images.length;ii++){var src=areaData.images[ii];if(src){allImages.push(src);imgsHtml+="<div class=\"img-slot\" data-idx=\""+(allImages.length-1)+"\"><img src=\""+src+"\" alt=\"\"></div>"}}areasHtml+="<div class=\"area-section\"><h3>"+(AREA_ICONS[areaName]||"📌")+" "+esc(areaName)+"</h3><div class=\"area-images\">"+imgsHtml+"</div>"+(areaData.desc?"<div class=\"area-desc\">"+esc(areaData.desc)+"</div>":"")+"</div>"}var vidHtml="";if(card.videoSrc){var isVid=card.videoType==="blob"||card.videoType==="file"||/\.mp4|\.webm|\.ogg/i.test(card.videoSrc)||card.videoSrc.indexOf("data:video")===0;if(isVid){vidHtml="<video controls src=\""+card.videoSrc+"\"></video>"}else{vidHtml="<iframe src=\""+card.videoSrc+"\" style=\"width:100%;aspect-ratio:16/9;border:none;\" allowfullscreen></iframe>"}vidHtml="<div class=\"video-section\"><h3>🎬 "+VIDEO_LABEL+"</h3><div class=\"video-wrapper\">"+vidHtml+"</div></div>"}var el=document.createElement("div");el.className="card";el.innerHTML="<div class=\"card-header\"><h2>"+esc(card.name)+"</h2>"+(card.price?"<div class=\"price\">"+esc(card.price)+"</div>":"")+"</div>"+(tags?"<div class=\"card-meta\">"+tags+"</div>":"")+(card.notes?"<div class=\"card-notes\">"+esc(card.notes)+"</div>":"")+(card.link?"<div class=\"card-link\"><a href=\""+esc(card.link)+"\" target=\"_blank\">🔗 "+VIEW_LINK_LABEL+"</a></div>":"")+"<button class=\"expand-btn\" onclick=\"toggleDetail(this)\"><span class=\"arrow\">▼</span> "+EXPAND_LABEL+"</button><div class=\"card-detail\">"+vidHtml+areasHtml+"</div>";grid.appendChild(el)})}
render();

</script>
</body>
</html>
